<!--
  Algebra 2 — Course Hub (master schedule).  Becomes index.html of your alg2 site.
  ─────────────────────────────────────────────────────────────────────────────
  The front door. Lists all nine units; each AVAILABLE unit links to its unit hub
  (unitN.html). As you finish building a unit, set ready:true. Mark the unit you're
  teaching right now with current:true so students see where they are.

  Site structure this assumes:
     alg2/
     ├─ index.html      (THIS file — the master schedule)
     ├─ unit1.html      (Unit 1 hub)  ← your current hub, just renamed from index.html
     ├─ unit2.html      (Unit 2 hub)
     │   ...
     └─ unit1/ unit2/ … (each unit's lesson, check, and pt pages)

  MIGRATION (one time):
   1. Rename your current index.html  →  unit1.html  (no other edits — its lesson
      links already point at unit1/lessonN.html, which still work).
   2. Upload THIS file as the new index.html.

  The "when" field is just a label — put a week range ("~3 weeks") or real dates
  ("Aug 12–30"), whatever helps students. It doesn't gate anything.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Newsreader:ital,opsz@0,6..72&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script>
  /* ============================= SET THESE ============================= */
  const COURSE = {
    title: "Algebra 2",
    tagline: "Full year · nine units",
    units: [
      { n:1, title:"Functions, Equations & Transformations", std:"F-IF.4–9 · F-BF.3 · A-CED.1–4 · A-REI.11", when:"~3 weeks",   file:"unit1.html", ready:true,  current:true  },
      { n:2, title:"Quadratic Functions & Complex Numbers",  std:"A-SSE.1–3 · A-REI.4 · N-CN.1–7 · F-IF.7–8", when:"~4 weeks",   file:"unit2.html", ready:true, current:true },
      { n:3, title:"Polynomial Functions",                   std:"A-APR.1–6 · A-SSE.2 · F-IF.7c",            when:"~4 weeks",   file:"unit3.html", ready:false, current:false },
      { n:4, title:"Rational Expressions & Functions",       std:"A-APR.6–7 · A-REI.2 · F-IF.7d",            when:"~3–4 weeks", file:"unit4.html", ready:false, current:false },
      { n:5, title:"Radical Functions & Rational Exponents", std:"N-RN.1–2 · A-REI.2 · F-IF.7b · F-BF.4",    when:"~3 weeks",   file:"unit5.html", ready:false, current:false },
      { n:6, title:"Exponential & Logarithmic Functions",    std:"F-IF.7e · F-LE.4 · A-SSE.3c · F-BF.5",     when:"~4 weeks",   file:"unit6.html", ready:false, current:false },
      { n:7, title:"Trigonometric Functions",                std:"F-TF.1–2 · F-TF.5 · F-TF.8",               when:"~4 weeks",   file:"unit7.html", ready:false, current:false },
      { n:8, title:"Sequences & Series",                     std:"A-SSE.4 · F-IF.3 · F-BF.2",                when:"~2–3 weeks", file:"unit8.html", ready:false, current:false },
      { n:9, title:"Statistics & Inference",                 std:"S-ID.4 · S-IC.1–6",                        when:"~3–4 weeks", file:"unit9.html", ready:false, current:false }
    ]
  };
  /* ==================================================================== */
</script>

<style>
  :root{--paper:#f6f3ec;--paper-2:#fffdf9;--ink:#23262b;--ink-soft:#5e6470;--line:#e3ddd0;--line-2:#d4ccbb;
    --blue:#2f6f8f;--blue-deep:#22536b;--blue-soft:#e2eef2;--gold:#b88a1f;--gold-soft:#f6edd6;}
  *{box-sizing:border-box} body{margin:0}
  .wrap{font-family:"Newsreader",Georgia,serif;color:var(--ink);line-height:1.6;
    background:radial-gradient(900px 460px at 90% -12%,#e6eff3 0,transparent 60%),var(--paper);min-height:100vh;
    padding:34px clamp(14px,4vw,40px) 60px}
  .shell{max-width:760px;margin:0 auto}

  header{margin-bottom:24px}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin:0 0 8px;font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(34px,6vw,54px);line-height:1.02;margin:0 0 12px;letter-spacing:-.01em}
  .intro{color:var(--ink-soft);font-size:16px;margin:0;max-width:62ch}

  .seclabel{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:28px 0 12px}

  .unit{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--paper-2);
    border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:10px;
    box-shadow:0 12px 26px -24px #23262b50;transition:transform .12s,border-color .12s,box-shadow .12s}
  a.unit:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 16px 30px -22px #23262b66}
  .unit .num{font-family:"Fraunces",serif;font-weight:900;font-size:24px;color:var(--blue);flex-shrink:0;width:30px;text-align:center}
  .unit .body{flex:1;min-width:0}
  .unit .t{font-size:17.5px;font-weight:500;line-height:1.25}
  .unit .s{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft);margin-top:3px}
  .unit .right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;text-align:right}
  .unit .when{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--ink-soft);background:#00000008;border:1px solid var(--line);border-radius:6px;padding:3px 8px;white-space:nowrap}
  .unit .arrow{color:var(--blue);font-size:20px}

  /* current unit — highlighted "you are here" */
  .unit.current{border-color:var(--blue);background:linear-gradient(0deg,var(--blue-soft),var(--paper-2) 70%)}
  .unit.current .num{color:var(--blue-deep)}
  .nowbadge{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:#fff;background:var(--blue);border-radius:6px;padding:3px 8px;font-weight:600}

  /* coming soon — muted, not yet built */
  .unit.soon{opacity:.5;cursor:default;pointer-events:none;background:var(--paper)}
  .unit.soon .arrow{display:none}
  .soonbadge{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);border:1px solid var(--line-2);border-radius:6px;padding:3px 7px}

  footer{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:13.5px;color:var(--ink-soft);font-style:italic}
</style>

<div class="wrap"><div class="shell">
  <header>
    <p class="kicker" id="kick"></p>
    <h1 id="title"></h1>
    <p class="intro">Here's the whole year. Tap the unit we're on to open its lessons — each lesson gives you instant feedback and a score to send your teacher, and every unit ends with a performance task. Units light up as we get to them.</p>
  </header>

  <div class="seclabel">Units</div>
  <div id="units"></div>

  <footer id="foot"></footer>
</div></div>

<script>
  const $=id=>document.getElementById(id);
  const safe=t=>(t||"").replace(/[<>]/g,"");
  $("kick").textContent=COURSE.tagline;
  $("title").textContent=COURSE.title;

  const box=$("units");
  COURSE.units.forEach(U=>{
    const inner=`<span class="num">${U.n}</span>
      <span class="body"><span class="t">${safe(U.title)}</span><span class="s">${safe(U.std)}</span></span>
      <span class="right">
        ${U.current ? '<span class="nowbadge">Current unit</span>' : (U.ready ? '' : '<span class="soonbadge">Coming soon</span>')}
        <span class="when">${safe(U.when)}</span>
        ${U.ready ? '<span class="arrow">→</span>' : ''}
      </span>`;
    if(U.ready){
      const a=document.createElement("a");
      a.className="unit"+(U.current?" current":"");
      a.href=U.file; a.innerHTML=inner;
      box.appendChild(a);
    }else{
      const d=document.createElement("div");
      d.className="unit soon";
      d.innerHTML=inner;
      box.appendChild(d);
    }
  });
  $("foot").textContent=`${COURSE.title} — full-year course map`;
</script>
