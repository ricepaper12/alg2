<!--
  Algebra 2 — Unit 4 Hub  (deploys as unit4.html, linked from the master index.html)
  ──────────────────────────────────────────────────────────────
  Static page, no API key. It's the front door students open.

  TO SET UP:
   1. Each lesson quiz is a copy of the CAT delivery template, saved at the
      path in its "file" field (e.g. unit4/lesson1.html).
   2. Set ready:true on a lesson once its quiz page exists; ready:false shows
      "coming soon" and won't link to a dead page.
   3. The end-of-unit performance task is assigned separately as a direct link
      (e.g. in Google Classroom), so you control timing. The card on this hub is
      just a signpost telling students the unit ends with the PT — it doesn't
      link anywhere, so there's nothing to toggle.

  Folder layout this expects:
     alg2/
     ├─ index.html        (this file)
     └─ unit4/
        ├─ lesson1.html … lesson8.html   (each lesson page)
        ├─ check1.html  … check8.html    (the lesson quizzes)
        └─ pt.html                       (end-of-unit performance task)
-->

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root{--paper:#f6f3ec;--paper-2:#fffdf9;--ink:#23262b;--ink-soft:#5e6470;--line:#e3ddd0;--line-2:#d4ccbb;
    --blue:#2f6f8f;--blue-deep:#22536b;--blue-soft:#e2eef2;--gold:#b88a1f;--gold-soft:#f6edd6;--clay:#c2533c;}
  *{box-sizing:border-box} body{margin:0}
  .wrap{font-family:"Newsreader",Georgia,serif;color:var(--ink);line-height:1.6;
    background:radial-gradient(900px 460px at 90% -12%,#e6eff3 0,transparent 60%),var(--paper);min-height:100vh;
    padding:34px clamp(14px,4vw,40px) 60px}
  .shell{max-width:760px;margin:0 auto}

  header{margin-bottom:26px}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin:0 0 8px;font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,5.5vw,48px);line-height:1.03;margin:0 0 10px;letter-spacing:-.01em}
  .std{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue-deep);background:var(--blue-soft);border-radius:7px;padding:6px 11px;display:inline-block}
  .intro{color:var(--ink-soft);font-size:16px;margin:16px 0 0;max-width:60ch}

  .seclabel{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:30px 0 12px}

  a.lesson{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--paper-2);
    border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:10px;
    box-shadow:0 12px 26px -24px #23262b50;transition:transform .12s,border-color .12s,box-shadow .12s}
  a.lesson:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 16px 30px -22px #23262b66}
  .lesson .num{font-family:"Fraunces",serif;font-weight:900;font-size:22px;color:var(--blue);flex-shrink:0;width:42px}
  .lesson .body{flex:1;min-width:0}
  .lesson .t{font-size:17.5px;font-weight:500}
  .lesson .s{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .lesson .arrow{color:var(--blue);font-size:20px;flex-shrink:0}
  .lesson.soon{opacity:.55;cursor:default;pointer-events:none;background:var(--paper)}
  .lesson.soon .arrow{display:none}
  .soonbadge{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);border:1px solid var(--line-2);border-radius:6px;padding:3px 7px}

  /* PT card — informational signpost (the PT is assigned separately as a link) */
  .ptcard{background:var(--gold-soft);border:1px solid #e3d2a6;border-radius:14px;padding:18px 20px}
  .ptcard .meta{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ptcard .ttl{font-family:"Fraunces",serif;font-weight:900;font-size:20px;margin:0 0 4px}
  .ptcard p{margin:0;font-size:15.5px;color:var(--ink)}
  .ptbadge{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);border:1px solid var(--line-2);border-radius:6px;padding:3px 7px}

  footer{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:13.5px;color:var(--ink-soft);font-style:italic}
</style>

<div class="wrap"><div class="shell">
  <header>
    <p class="kicker" id="kick"></p>
    <h1 id="title"></h1>
    <span class="std" id="std"></span>
    <p class="intro">Work through the lesson checks as we go — each one gives you instant feedback and a score to send your teacher. At the end of the unit comes the performance task, where you put the whole unit together.</p>
  </header>

  <div class="seclabel">Lesson checks</div>
  <div id="lessons"></div>

  <div class="seclabel">End of unit</div>
  <div id="ptcard"></div>

  <footer id="foot"></footer>
</div></div>

<script>
  const $=id=>document.getElementById(id);
  $("kick").textContent=`Algebra 2 · Unit ${UNIT.number}`;
  $("title").textContent=UNIT.title;
  $("std").textContent=UNIT.standards;

  // End-of-unit PT card: an informational signpost. The PT is assigned separately
  // as a direct link (e.g. in Google Classroom), so this card doesn't link anywhere.
  $("ptcard").innerHTML=`<div class="ptcard">
    <div class="meta">Performance Task · teacher-scored <span class="ptbadge">Completes the unit</span></div>
    <div class="ttl">Unit ${UNIT.number} Performance Task</div>
    <p>The capstone that finishes Unit ${UNIT.number}. Your teacher will assign it when the unit wraps up — you'll show your work on a paper copy, with the Coach there to help you think it through.</p>
  </div>`;

  const box=$("lessons");
  UNIT.lessons.forEach(L=>{
    const safe=t=>(t||"").replace(/[<>]/g,"");
    if(L.ready){
      const a=document.createElement("a");
      a.className="lesson"; a.href=L.file;
      a.innerHTML=`<span class="num">${safe(L.n)}</span>
        <span class="body"><span class="t">${safe(L.title)}</span><span class="s">${safe(L.std)}</span></span>
        <span class="arrow">→</span>`;
      box.appendChild(a);
    }else{
      const d=document.createElement("div");
      d.className="lesson soon";
      d.innerHTML=`<span class="num">${safe(L.n)}</span>
        <span class="body"><span class="t">${safe(L.title)}</span><span class="s">${safe(L.std)}</span></span>
        <span class="soonbadge">Coming soon</span>`;
      box.appendChild(d);
    }
  });
  $("foot").textContent=`Algebra 2 — Unit ${UNIT.number}: ${UNIT.title}`;
</script>
