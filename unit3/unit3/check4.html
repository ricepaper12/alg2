<!--
  CAT Delivery Template вҖ” Algebra 2 (student-facing quiz page)
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  Drop in one lesson's CAT set (from the Designer's "Copy with keys" / its JSON)
  and this renders it as a self-grading quiz with feedback.

  вҖў Auto-graded: multiple_choice, multiple_select, numeric.
  вҖў Self-check (reveal key, student assesses): expression, short_cr, tech_enhanced вҖ”
    because a custom page can't judge expression-equivalence the way MyOpenMath can.
  вҖў No logins, no storage вҖ” the page never knows who the student is. At the end it
    shows a score card with a name field the student types and screenshots into
    Google Classroom (that's how you get the "who").

  TO MAKE A LESSON: copy this file, replace the QUIZ object below with that
  lesson's items, and link it from your Unit hub page.

  Answer-format convention (matches the Designer): for multiple_choice "answer" is
  the correct letter ("A"); for multiple_select it's letters ("A, C, D"); for
  numeric it's the number; for expression/short_cr it's the sample answer text.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Newsreader:ital,opsz@0,6..72&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script>
  /* ============================ PASTE LESSON ITEMS HERE ============================ */
  const QUIZ = {
    lesson:"3.3b вҖ” Sum/Difference of Cubes & Quadratic Form",
    items:[
      {type:"multiple_choice", claim:"1", dok:"1", stem:"Which is a perfect cube?",
        options:["A) 27xВі","B) 9xВІ","C) 12xВі","D) 4xвҒ¶"], answer:"A",
        rationale:"27xВі = (3x)Ві. 9 and 12 aren't perfect cubes, and 4 isn't either."},
      {type:"multiple_choice", claim:"1", dok:"1", stem:"The difference of cubes aВі вҲ’ bВі factors as:",
        options:["A) (a вҲ’ b)(aВІ + ab + bВІ)","B) (a вҲ’ b)(aВІ вҲ’ ab + bВІ)","C) (a вҲ’ b)Ві","D) (a вҲ’ b)(aВІ + bВІ)"], answer:"A",
        rationale:"aВі вҲ’ bВі = (a вҲ’ b)(aВІ + ab + bВІ) вҖ” opposite sign first, then all positive."},
      {type:"expression", claim:"1", dok:"2", stem:"Factor xВі + 1.", answer:"(x + 1)(xВІ вҲ’ x + 1)",
        rationale:"Sum of cubes, a = x, b = 1: (x+1)(xВІвҲ’x+1)."},
      {type:"expression", claim:"1", dok:"2", stem:"Factor 27xВі вҲ’ 8.", answer:"(3x вҲ’ 2)(9xВІ + 6x + 4)",
        rationale:"27xВі=(3x)Ві, 8=2Ві: (3xвҲ’2)(9xВІ+6x+4)."},
      {type:"expression", claim:"1", dok:"2", stem:"Factor xвҒҙ вҲ’ 10xВІ + 9 completely.", answer:"(x вҲ’ 1)(x + 1)(x вҲ’ 3)(x + 3)",
        rationale:"uВІвҲ’10u+9=(uвҲ’1)(uвҲ’9) вҶ’ (xВІвҲ’1)(xВІвҲ’9) вҶ’ (xвҲ’1)(x+1)(xвҲ’3)(x+3)."},
      {type:"multiple_select", claim:"1", dok:"2", stem:"Select ALL true.",
        options:["A) xВівҲ’27 = (xвҲ’3)(xВІ+3x+9)","B) xВі+8 = (x+2)(xВІвҲ’2x+4)","C) xвҒҙвҲ’16 = (xВІвҲ’4)(xВІ+4)","D) xВівҲ’27 = (xвҲ’3)Ві"],
        answer:"A, B, C", rationale:"A вң“ (diff of cubes), B вң“ (sum of cubes), C вң“ (diff of squares). D is false вҖ” (xвҲ’3)Ві вү  xВівҲ’27."},
      {type:"short_cr", claim:"3", dok:"2", stem:"Explain the substitution trick for factoring xвҒҙ вҲ’ 7xВІ + 12, step by step.",
        answer:"Let u = xВІ, so xвҒҙ becomes uВІ and the polynomial becomes uВІ вҲ’ 7u + 12. Factor that as (u вҲ’ 3)(u вҲ’ 4). Substitute xВІ back in to get (xВІ вҲ’ 3)(xВІ вҲ’ 4), then factor any remaining difference of squares вҖ” here xВІ вҲ’ 4 = (x вҲ’ 2)(x + 2), giving (xВІ вҲ’ 3)(x вҲ’ 2)(x + 2).",
        rationale:"Look for: let u = xВІ, factor the quadratic in u, substitute back, then finish any difference of squares."}
    ]
  };
    /* ================================================================================ */
</script>

<style>
  :root{--paper:#f6f3ec;--paper-2:#fffdf9;--ink:#23262b;--ink-soft:#5e6470;--line:#e3ddd0;--line-2:#d4ccbb;
    --blue:#2f6f8f;--blue-soft:#e2eef2;--green:#3c7d56;--green-soft:#e0efe5;--red:#c2533c;--red-soft:#f6e2db;--gold:#b88a1f;}
  *{box-sizing:border-box} body{margin:0}
  .wrap{font-family:"Newsreader",Georgia,serif;color:var(--ink);line-height:1.6;background:var(--paper);min-height:100vh;padding:26px clamp(14px,4vw,36px) 60px}
  .shell{max-width:680px;margin:0 auto}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin:0 0 6px;font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(26px,5vw,38px);line-height:1.05;margin:0 0 6px}
  .sub{color:var(--ink-soft);font-size:15.5px;margin:0 0 22px}
  .q{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:0 14px 30px -26px #23262b40}
  .qhead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
  .qnum{font-family:"Fraunces",serif;font-weight:900;font-size:20px;color:var(--blue)}
  .tags{display:flex;gap:5px}
  .tag{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;border-radius:5px;padding:2px 7px;background:var(--blue-soft);color:var(--blue);font-weight:600}
  .stem{font-size:17px;margin:0 0 12px}
  .opt{display:flex;align-items:flex-start;gap:11px;border:1px solid var(--line-2);border-radius:10px;padding:11px 13px;margin:7px 0;cursor:pointer;font-size:16px;transition:background .12s,border-color .12s;background:#fff}
  .opt:hover{border-color:var(--blue)}
  .opt input{margin-top:4px;flex-shrink:0;accent-color:var(--blue);width:17px;height:17px}
  .opt.correct{background:var(--green-soft);border-color:#a9cdb4}
  .opt.wrong{background:var(--red-soft);border-color:#e3b8ab}
  input[type=text]{width:100%;font-family:"JetBrains Mono",monospace;font-size:16px;background:#fff;border:1px solid var(--line-2);border-radius:10px;padding:12px 13px;outline:none}
  textarea{width:100%;font-family:"Newsreader",serif;font-size:16.5px;background:#fff;border:1px solid var(--line-2);border-radius:10px;padding:12px 13px;outline:none;min-height:80px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2f6f8f22}
  .fb{margin-top:11px;border-radius:0 9px 9px 0;padding:10px 14px;font-size:15px;display:none}
  .fb.show{display:block}
  .fb.ok{background:var(--green-soft);border-left:3px solid var(--green)}
  .fb.no{background:var(--red-soft);border-left:3px solid var(--red)}
  .fb.self{background:#fbf6ec;border-left:3px solid var(--gold)}
  .fb .lbl{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:4px}
  .fb.ok .lbl{color:var(--green)} .fb.no .lbl{color:var(--red)} .fb.self .lbl{color:var(--gold)}
  .selfmark{margin-top:9px;display:flex;gap:8px}
  .selfmark button{font-family:"JetBrains Mono",monospace;font-size:12px;border:1px solid var(--line-2);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer}
  .selfmark button.pick{background:var(--blue);color:#fff;border-color:var(--blue)}
  button.go{font-family:"JetBrains Mono",monospace;cursor:pointer;border:none;border-radius:11px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;letter-spacing:.03em;padding:14px 24px;transition:filter .15s,transform .12s}
  button.go:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .card{background:var(--paper-2);border:2px solid var(--blue);border-radius:16px;padding:22px;margin-top:8px;display:none}
  .card.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .score{font-family:"Fraunces",serif;font-weight:900;font-size:46px;color:var(--blue);line-height:1}
  .card h2{font-family:"Fraunces",serif;margin:0 0 4px;font-size:22px}
  .namerow{display:flex;gap:10px;align-items:center;margin:16px 0 6px;flex-wrap:wrap}
  .namerow label{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .namerow input{max-width:240px}
  .shot{font-size:14px;color:var(--ink-soft);font-style:italic;margin-top:10px}
</style>

<div class="wrap"><div class="shell">
  <p class="kicker">Weekly check В· Algebra 2</p>
  <h1 id="title"></h1>
  <p class="sub">Answer each question. You'll get instant feedback, and a score to screenshot for your teacher.</p>
  <div id="quiz"></div>
  <button class="go" id="submitBtn">Submit & check my work</button>

  <div class="card" id="result">
    <p class="kicker" style="margin-bottom:8px">Your score</p>
    <div class="score" id="scoreNum"></div>
    <h2 id="scoreNote"></h2>
    <div class="namerow">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Type your name">
      <span id="dateStamp" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-soft)"></span>
    </div>
    <div class="namerow" id="gbWrap" style="display:none">
      <label for="sid">Student ID</label>
      <input type="text" id="sid" inputmode="numeric" placeholder="Your student ID">
    </div>
    <button class="go" id="gbSend" style="display:none">Send my score to the gradebook вҶ—</button>
    <p class="shot" id="shotLine">рҹ“ё Screenshot this card with your name filled in and submit it to Google Classroom.</p>
  </div>
</div></div>

<script src="../gradebook.js"></script>
<script>
  const $=id=>document.getElementById(id);
  const AUTO=["multiple_choice","multiple_select","numeric"];
  const letters=a=>(a||"").toUpperCase().replace(/[^A-Z]/g,"").split("");
  const norm=s=>(s||"").toString().trim().replace(/\s+/g,"").replace(/вҲ’/g,"-");
  let graded=false;

  $("title").textContent=QUIZ.lesson;

  QUIZ.items.forEach((it,i)=>{
    const q=document.createElement("div"); q.className="q";
    let body="";
    if(it.type==="multiple_choice"||it.type==="multiple_select"){
      const input=it.type==="multiple_choice"?"radio":"checkbox";
      body=(it.options||[]).map((o,j)=>
        `<label class="opt" data-i="${i}" data-j="${j}"><input type="${input}" name="q${i}" value="${j}">${o.replace(/[<>]/g,"")}</label>`).join("");
    }else if(it.type==="numeric"){
      body=`<input type="text" id="in${i}" inputmode="decimal" placeholder="Your answer">`;
    }else{ // expression / short_cr / tech_enhanced  вҶ’ self-check
      body= it.type==="short_cr"
        ? `<textarea id="in${i}" placeholder="Type your reasoning..."></textarea>`
        : `<input type="text" id="in${i}" placeholder="Type your answer">`;
    }
    q.innerHTML=`<div class="qhead"><span class="qnum">${i+1}</span>
      <div class="tags"><span class="tag">${it.type.replace("_"," ")}</span><span class="tag">DOK ${it.dok}</span></div></div>
      <p class="stem">${(it.stem||"").replace(/[<>]/g,"")}</p>${body}
      <div class="fb" id="fb${i}"></div>`;
    $("quiz").appendChild(q);
  });

  function grade(){
    if(graded) return; graded=true;
    let correct=0, autoTotal=0;
    QUIZ.items.forEach((it,i)=>{
      const fb=$("fb"+i);
      if(it.type==="multiple_choice"){
        autoTotal++;
        const sel=document.querySelector(`input[name="q${i}"]:checked`);
        const right=letters(it.answer)[0]?(letters(it.answer)[0].charCodeAt(0)-65):-1;
        document.querySelectorAll(`.opt[data-i="${i}"]`).forEach(o=>{
          const j=+o.dataset.j; if(j===right)o.classList.add("correct");
          if(sel&&+sel.value===j&&j!==right)o.classList.add("wrong");
        });
        const ok=sel&&+sel.value===right; if(ok)correct++;
        fb.className=`fb show ${ok?"ok":"no"}`;
        fb.innerHTML=`<span class="lbl">${ok?"Correct":"Not quite"}</span>${it.rationale.replace(/[<>]/g,"")}`;
      }else if(it.type==="multiple_select"){
        autoTotal++;
        const want=new Set(letters(it.answer).map(L=>L.charCodeAt(0)-65));
        const got=new Set([...document.querySelectorAll(`input[name="q${i}"]:checked`)].map(c=>+c.value));
        document.querySelectorAll(`.opt[data-i="${i}"]`).forEach(o=>{
          const j=+o.dataset.j; if(want.has(j))o.classList.add("correct");
          if(got.has(j)&&!want.has(j))o.classList.add("wrong");
        });
        const ok=want.size===got.size&&[...want].every(x=>got.has(x)); if(ok)correct++;
        fb.className=`fb show ${ok?"ok":"no"}`;
        fb.innerHTML=`<span class="lbl">${ok?"Correct":"Check your selections"}</span>${it.rationale.replace(/[<>]/g,"")}`;
      }else if(it.type==="numeric"){
        autoTotal++;
        const v=parseFloat(norm($("in"+i).value)), a=parseFloat(norm(it.answer));
        const ok=!isNaN(v)&&Math.abs(v-a)<1e-6; if(ok)correct++;
        fb.className=`fb show ${ok?"ok":"no"}`;
        fb.innerHTML=`<span class="lbl">${ok?"Correct":"Not quite"}</span>${it.rationale.replace(/[<>]/g,"")}`;
      }else{ // self-check
        fb.className="fb show self";
        fb.innerHTML=`<span class="lbl">Sample answer вҖ” check yours against it</span>${(it.answer||"").replace(/[<>]/g,"")}
          <div class="selfmark"><button data-i="${i}">I got it</button><button data-i="${i}">Review this</button></div>`;
        fb.querySelectorAll("button").forEach(b=>b.onclick=()=>{
          fb.querySelectorAll("button").forEach(x=>x.classList.remove("pick")); b.classList.add("pick");});
      }
    });
    $("scoreNum").textContent=`${correct} / ${autoTotal}`;
    const pct=autoTotal?correct/autoTotal:0;
    $("scoreNote").textContent = pct===1?"Perfect on the graded items!":pct>=0.7?"Solid вҖ” review the misses.":"Worth another look вҖ” read the feedback.";
    $("dateStamp").textContent=new Date().toLocaleDateString();
    const GB=window.GRADEBOOK;
    if(GB&&GB.enabled){
      const pctVal=Math.round(pct*100);
      const lessonCode=(QUIZ.lesson.split("вҖ”")[0]||QUIZ.lesson).trim();
      $("shotLine").style.display="none";
      $("gbWrap").style.display="";
      const send=$("gbSend"); send.style.display="";
      send.onclick=()=>{
        const sid=($("sid").value||"").trim();
        if(!sid){alert("Enter your student ID first.");$("sid").focus();return;}
        const u=new URL(GB.formBase), e=GB.entry;
        u.searchParams.set("usp","pp_url");
        u.searchParams.set(e.id,sid);
        u.searchParams.set(e.lesson,lessonCode);
        u.searchParams.set(e.score,pctVal);
        u.searchParams.set(e.date,new Date().toISOString().slice(0,10));
        window.open(u.toString(),"_blank","noopener");
      };
    }
    $("result").classList.add("show");
    $("submitBtn").style.display="none";
    $("result").scrollIntoView({behavior:"smooth"});
  }
  $("submitBtn").onclick=grade;
</script>
