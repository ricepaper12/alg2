<!--
  Alg2 Lesson Page Template — prototype: Lesson 1.1
  ─────────────────────────────────────────────────
  Static page (no API). Structure: learning target → key terms → worked example
  ("I do") → guided example ("we do", revealed) → faded practice ("you try",
  auto-graded MC/numeric, self-check for algebra) → reflection.

  To make another lesson: copy this file and edit the LESSON object below.
  Auto-grading covers numeric and multiple choice; "expression" items reveal a
  sample answer for self-check (no CAS on a static page).
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Newsreader:ital,opsz@0,6..72&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script>
  /* ============================== EDIT THIS LESSON ============================== */
  const LESSON = {
    num:"2.5", title:"Solving by Square Roots",
    target:"I can solve a quadratic by taking square roots when it has the form x² = k or (x − h)² = k.",
    terms:[
      {term:"Square root property", def:"If x² = k (and k ≥ 0), then x = ±√k — remember BOTH roots.", warn:true},
      {term:"± (plus or minus)", def:"Square-rooting gives two answers: a positive and a negative."},
      {term:"Perfect square (number)", def:"A number whose square root is whole, like 9 (√9 = 3) or 25 (√25 = 5)."},
      {term:"Isolate the square", def:"Get the squared part alone on one side before taking the root."}
    ],
    worked:{problem:"Solve 2x² − 18 = 0 by taking square roots.",
      steps:[
        {math:"2x² = 18", why:"Add 18 to both sides."},
        {math:"x² = 9", why:"Divide both sides by 2 to isolate x²."},
        {math:"x = ±√9", why:"Square root property — keep both signs."},
        {math:"x = ±3", why:"√9 = 3."}
      ], answer:"x = 3 or x = −3"},
    guided:{problem:"Solve (x − 4)² = 25 by taking square roots.",
      steps:[
        {math:"(x − 4)² = 25", why:"The squared part is already isolated."},
        {math:"x − 4 = ±√25", why:"Square root property."},
        {math:"x − 4 = ±5", why:"√25 = 5."},
        {math:"x = 4 ± 5", why:"Add 4 to both sides."},
        {math:"x = 9 or x = −1", why:"Split the ±."}
      ], answer:"x = 9 or x = −1"},
    practice:[
      {type:"numeric", stem:"Solve x² = 49. Enter the POSITIVE solution.", answer:"7",
        rationale:"x = ±√49 = ±7. The positive one is 7 (remember −7 is also a solution)."},
      {type:"multiple_choice", stem:"What are the solutions to x² = 16?",
        options:["A) x = 4 or x = −4","B) x = 4 only","C) x = 8 or x = −8","D) x = 256"], answer:"A",
        rationale:"x = ±√16 = ±4 — both signs."},
      {type:"numeric", stem:"Solve 3x² = 75. Enter the positive solution.", answer:"5",
        rationale:"x² = 25 → x = ±5. Positive is 5."},
      {type:"expression", stem:"Solve (x + 2)² = 9. Write both solutions.", answer:"x = 1 or x = −5",
        rationale:"x + 2 = ±3 → x = −2 ± 3 → x = 1 or x = −5."},
      {type:"expression", stem:"Solve x² = 20. Write both solutions in simplest square-root form.",
        answer:"x = 2√5 or x = −2√5", rationale:"x = ±√20 = ±√(4·5) = ±2√5. Not every answer is whole."}
    ],
    reflect:"Why does taking the square root of both sides always give TWO answers? When might it give no real answer at all?",
    checkUrl:"check6.html", morePracticeUrl:""
  };
    /* ============================================================================= */
</script>

<style>
  :root{--paper:#f6f3ec;--paper-2:#fffdf9;--ink:#23262b;--ink-soft:#5e6470;--line:#e3ddd0;--line-2:#d4ccbb;
    --blue:#2f6f8f;--blue-deep:#22536b;--blue-soft:#e2eef2;--green:#3c7d56;--green-soft:#e0efe5;--red:#c2533c;--red-soft:#f6e2db;--gold:#b88a1f;--gold-soft:#f6edd6;}
  *{box-sizing:border-box} body{margin:0}
  .wrap{font-family:"Newsreader",Georgia,serif;color:var(--ink);line-height:1.65;
    background:radial-gradient(900px 460px at 90% -12%,#e6eff3 0,transparent 60%),var(--paper);min-height:100vh;
    padding:30px clamp(14px,4vw,40px) 60px}
  .shell{max-width:680px;margin:0 auto}
  .kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin:0 0 7px;font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(27px,5vw,40px);line-height:1.04;margin:0 0 14px}

  .target{display:flex;gap:12px;align-items:flex-start;background:var(--blue-soft);border:1px solid #bcdbe6;border-radius:13px;padding:15px 18px;margin-bottom:8px}
  .target .ico{font-size:20px;line-height:1.2}
  .target .lbl{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue-deep);font-weight:600;display:block;margin-bottom:3px}
  .target .txt{font-size:17px}

  .sec{font-family:"Fraunces",serif;font-weight:900;font-size:22px;margin:34px 0 12px;color:var(--blue-deep);display:flex;align-items:baseline;gap:9px}
  .sec .tag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}

  .term{background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:8px}
  .term .t{font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--blue-deep);font-size:15px}
  .term .d{font-size:15.5px;margin-top:2px}
  .term.warn{background:var(--gold-soft);border-color:#e3d2a6}
  .term.warn .t{color:var(--gold)}

  .ex{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 14px 30px -26px #23262b40}
  .ex .prob{font-size:17px;font-weight:600;margin-bottom:14px}
  .step{display:flex;gap:14px;align-items:baseline;padding:7px 0;border-top:1px dashed var(--line)}
  .step:first-of-type{border-top:none}
  .step .m{font-family:"JetBrains Mono",monospace;font-size:16px;color:var(--ink);min-width:42%;}
  .step .w{font-size:14.5px;color:var(--ink-soft);font-style:italic}
  .ans{margin-top:13px;background:var(--green-soft);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:9px 14px;font-family:"JetBrains Mono",monospace;font-size:15px}
  .reveal{font-family:"JetBrains Mono",monospace;font-size:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;padding:10px 16px;cursor:pointer}
  .reveal:hover{filter:brightness(1.08)}
  .hidden{display:none}

  .p-item{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:11px}
  .p-stem{font-size:16.5px;margin-bottom:10px}
  .p-stem .n{font-family:"Fraunces",serif;font-weight:900;color:var(--blue);margin-right:7px}
  input[type=text]{font-family:"JetBrains Mono",monospace;font-size:16px;background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:10px 12px;outline:none;max-width:220px}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2f6f8f22}
  .opt{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line-2);border-radius:9px;padding:9px 12px;margin:6px 0;cursor:pointer;font-size:15.5px;background:#fff}
  .opt:hover{border-color:var(--blue)}
  .opt input{margin-top:3px;accent-color:var(--blue);width:16px;height:16px;flex-shrink:0}
  .opt.correct{background:var(--green-soft);border-color:#a9cdb4}
  .opt.wrong{background:var(--red-soft);border-color:#e3b8ab}
  .check{font-family:"JetBrains Mono",monospace;font-size:12.5px;background:transparent;color:var(--blue);border:1px solid var(--line-2);border-radius:8px;padding:8px 14px;cursor:pointer;margin-left:8px}
  .check:hover{background:#2f6f8f0d}
  .fb{margin-top:10px;border-radius:0 8px 8px 0;padding:9px 13px;font-size:14.5px;display:none}
  .fb.show{display:block}
  .fb.ok{background:var(--green-soft);border-left:3px solid var(--green)}
  .fb.no{background:var(--red-soft);border-left:3px solid var(--red)}
  .fb.self{background:var(--gold-soft);border-left:3px solid var(--gold)}
  .fb .l{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:3px}
  .fb.ok .l{color:var(--green)} .fb.no .l{color:var(--red)} .fb.self .l{color:var(--gold)}

  .reflect{background:#fbf6ec;border:1px dashed var(--gold);border-radius:13px;padding:16px 18px;margin-top:30px}
  .reflect .l{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;display:block;margin-bottom:5px}
  .reflect .q{font-size:16.5px}
  a.more{display:inline-block;margin-top:22px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--blue);text-decoration:none;border:1px solid var(--line-2);border-radius:10px;padding:11px 18px}
  a.more:hover{background:#2f6f8f0d}
  a.checkcta{display:flex;align-items:center;justify-content:space-between;gap:14px;text-decoration:none;color:#fff;background:var(--blue);border-radius:14px;padding:18px 22px;margin-top:26px;box-shadow:0 16px 32px -22px var(--blue-deep)}
  a.checkcta:hover{filter:brightness(1.07)}
  a.checkcta .ct{font-family:"Fraunces",serif;font-weight:900;font-size:20px}
  a.checkcta .cs{font-size:14px;opacity:.9;margin-top:2px}
  a.checkcta .go{font-family:"JetBrains Mono",monospace;font-size:13px;border:1px solid rgba(255,255,255,.5);border-radius:9px;padding:9px 14px;white-space:nowrap}
</style>

<div class="wrap"><div class="shell">
  <p class="kicker" id="kick"></p>
  <h1 id="title"></h1>
  <div class="target"><span class="ico">🎯</span><span><span class="lbl">Learning target</span><span class="txt" id="target"></span></span></div>

  <div class="sec">Words to know <span class="tag">read first</span></div>
  <div id="terms"></div>

  <div class="sec">Watch one worked out <span class="tag">I do</span></div>
  <div class="ex" id="worked"></div>

  <div class="sec">Now one together <span class="tag">we do</span></div>
  <div class="ex" id="guided"></div>

  <div class="sec">You try <span class="tag">instant feedback</span></div>
  <div id="practice"></div>

  <div class="reflect"><span class="l">Before you move on</span><span class="q" id="reflect"></span></div>
  <div id="checkWrap"></div>
  <span id="moreWrap"></span>
</div></div>

<script>
  const $=id=>document.getElementById(id);
  const esc=s=>(s||"").toString().replace(/[<>]/g,"");
  const norm=s=>(s||"").toString().trim().replace(/\s+/g,"").replace(/−/g,"-");

  $("kick").textContent=`Algebra 2 · Lesson ${LESSON.num}`;
  $("title").textContent=LESSON.title;
  $("target").textContent=LESSON.target;
  $("reflect").textContent=LESSON.reflect;

  // terms
  $("terms").innerHTML=LESSON.terms.map(t=>
    `<div class="term ${t.warn?"warn":""}"><span class="t">${esc(t.term)}</span><div class="d">${esc(t.def)}</div></div>`).join("");

  // worked (fully shown)
  function exHTML(ex, reveal){
    const steps=ex.steps.map(s=>`<div class="step"><span class="m">${esc(s.math)}</span><span class="w">${esc(s.why)}</span></div>`).join("");
    const inner=`<div class="prob">${esc(ex.problem)}</div>${steps}<div class="ans">${esc(ex.answer)}</div>`;
    return inner;
  }
  $("worked").innerHTML=exHTML(LESSON.worked);

  // guided (steps hidden behind reveal)
  const g=LESSON.guided;
  $("guided").innerHTML=`<div class="prob">${esc(g.problem)}</div>
    <button class="reveal" id="revBtn">Show me the steps →</button>
    <div class="hidden" id="gsteps">${g.steps.map(s=>`<div class="step"><span class="m">${esc(s.math)}</span><span class="w">${esc(s.why)}</span></div>`).join("")}<div class="ans">${esc(g.answer)}</div></div>`;
  $("revBtn").onclick=()=>{ $("gsteps").classList.remove("hidden"); $("revBtn").classList.add("hidden"); };

  // practice (per-item check)
  const box=$("practice");
  LESSON.practice.forEach((it,i)=>{
    const d=document.createElement("div"); d.className="p-item";
    let body="";
    if(it.type==="multiple_choice"){
      body=(it.options||[]).map((o,j)=>`<label class="opt" data-i="${i}" data-j="${j}"><input type="radio" name="p${i}" value="${j}">${esc(o)}</label>`).join("")
        +`<button class="check" data-i="${i}">Check</button>`;
    }else if(it.type==="numeric"){
      body=`<input type="text" id="pin${i}" inputmode="decimal" placeholder="Answer"><button class="check" data-i="${i}">Check</button>`;
    }else{ // expression → self-check
      body=`<input type="text" id="pin${i}" placeholder="Your answer"><button class="check" data-i="${i}">Show sample</button>`;
    }
    d.innerHTML=`<div class="p-stem"><span class="n">${i+1}</span>${esc(it.stem)}</div>${body}<div class="fb" id="pfb${i}"></div>`;
    box.appendChild(d);
  });

  box.querySelectorAll(".check").forEach(btn=>{
    btn.onclick=()=>{
      const i=+btn.dataset.i, it=LESSON.practice[i], fb=$("pfb"+i);
      if(it.type==="multiple_choice"){
        const sel=document.querySelector(`input[name="p${i}"]:checked`);
        const right=it.answer.trim().toUpperCase().charCodeAt(0)-65;
        document.querySelectorAll(`.opt[data-i="${i}"]`).forEach(o=>{o.classList.remove("correct","wrong");
          const j=+o.dataset.j; if(j===right)o.classList.add("correct");
          if(sel&&+sel.value===j&&j!==right)o.classList.add("wrong");});
        const ok=sel&&+sel.value===right;
        fb.className=`fb show ${ok?"ok":"no"}`; fb.innerHTML=`<span class="l">${ok?"Correct":"Not quite"}</span>${esc(it.rationale)}`;
      }else if(it.type==="numeric"){
        const v=parseFloat(norm($("pin"+i).value)), a=parseFloat(norm(it.answer));
        const ok=!isNaN(v)&&Math.abs(v-a)<1e-6;
        fb.className=`fb show ${ok?"ok":"no"}`; fb.innerHTML=`<span class="l">${ok?"Correct":"Try again"}</span>${esc(it.rationale)}`;
      }else{
        fb.className="fb show self"; fb.innerHTML=`<span class="l">Sample answer — check yours</span>${esc(it.answer)}<br><span style="color:var(--ink-soft);font-style:italic">${esc(it.rationale)}</span>`;
      }
    };
  });

  if(LESSON.checkUrl){
    $("checkWrap").innerHTML=`<a class="checkcta" href="${LESSON.checkUrl}">
      <div><div class="ct">Ready for the check?</div><div class="cs">Take the Lesson ${esc(LESSON.num)} quiz when you feel ready.</div></div>
      <span class="go">Start →</span></a>`;
  }
  if(LESSON.morePracticeUrl){
    $("moreWrap").innerHTML=`<a class="more" href="${LESSON.morePracticeUrl}" target="_blank" rel="noopener">Want more practice? →</a>`;
  }
</script>
